name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-and-build:
    name: Security & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Fail if any HIGH or CRITICAL vulnerabilities exist in production deps
      - name: npm audit
        run: npm audit --audit-level=high --omit=dev

      # Lint — catches code quality and potential security anti-patterns
      - name: Lint
        run: npm run lint

      # Type-check — prevents type-unsafe code from reaching production
      - name: Type check
        run: npx tsc --noEmit

      # Build — verifies the app compiles correctly without real env vars
      - name: Build
        run: npm run build
        env:
          # Dummy values so Next.js build completes without real credentials.
          # Real secrets live in Vercel environment variables, never in this file.
          NEXT_PUBLIC_SANITY_PROJECT_ID: ci-dummy
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_CALCOM_URL: https://cal.com
          RAZORPAY_KEY_ID: rzp_test_dummy
          RAZORPAY_KEY_SECRET: dummy_secret
          RAZORPAY_WEBHOOK_SECRET: dummy_webhook_secret
          RAZORPAY_PLAN_MONTHLY_ID: plan_dummy
          RAZORPAY_PLAN_QUARTERLY_ID: plan_dummy
          RAZORPAY_PLAN_ANNUAL_ID: plan_dummy
          SUPABASE_URL: https://dummy.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: dummy_service_role_key
